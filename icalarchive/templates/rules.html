{% extends "base.html" %}

{% block title %}Rules - ICalArchive{% endblock %}

{% block content %}
<h2 class="mb-4">Global Hide <span class="badge bg-secondary fs-6 align-middle"
        title="Regex strings added here will globally eradicate matching events from all calendar outputs. This acts as the match_patterns algorithm for the implicit 'hidden' Series.">[?]</span>
</h2>

<div class="row">
    <div class="col-md-6">
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0">New Pattern</h5>
            </div>
            <div class="card-body">
                <form id="addRuleForm" class="d-flex gap-2">
                    <input type="text" class="form-control" id="summaryPattern" placeholder="Regex (e.g. .*spam.*)"
                        required>
                    <button type="submit" class="btn btn-danger">Hide</button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header border-bottom-0">
                <h5 class="mb-0">Active Patterns</h5>
            </div>
            <div class="table-responsive">
                {% if rules %}
                <table class="table table-hover table-sm align-middle mb-0">
                    <tbody>
                        {% for rule in rules %}
                        <tr>
                            <td class="ps-3"><code>{{ rule.rule_id }}</code></td>
                            <td class="text-end pe-3">
                                <button class="btn btn-sm btn-outline-danger shadow-sm"
                                    onclick="deleteRule('{{ rule.rule_id }}')">
                                    <i class="bi bi-trash"></i> Drop
                                </button>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
                {% else %}
                <div class="p-3 text-muted text-center">None</div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('addRuleForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const text = document.getElementById('summaryPattern').value.trim();
        if (!text) return;

        try {
            const response = await fetch('/api/rules', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ rule_type: 'summary_regex', params: { pattern: text } })
            });
            if (response.ok) location.reload();
            else {
                const error = await response.json();
                alert('Error: ' + (error.detail || 'Failed'));
            }
        } catch (error) {
            alert('Error: ' + error.message);
        }
    });

    async function deleteRule(ruleId) {
        if (!confirm('Drop pattern?')) return;
        try {
            const response = await fetch(`/api/rules/${encodeURIComponent(ruleId)}`, { method: 'DELETE' });
            if (response.ok) location.reload();
            else alert('Failed');
        } catch (error) {
            alert('Error: ' + error.message);
        }
    }
</script>
{% endblock %}
