<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ICalArchive{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .navbar-brand {
            font-weight: bold;
        }

        .card {
            margin-bottom: 1rem;
        }

        .stat-card {
            text-align: center;
            padding: 2rem;
        }

        .stat-number {
            font-size: 3rem;
            font-weight: bold;
            color: #0d6efd;
        }

        .stat-label {
            color: #6c757d;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">ICalArchive</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/calendar">Calendar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/events">Events (List)</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/series">Series</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/rules">Rules</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/sources">Sources</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/outputs">Outputs</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-warning fw-bold ms-lg-3" href="#" data-bs-toggle="modal"
                            data-bs-target="#globalSettingsModal"><i class="bi bi-gear-fill me-1"></i>Settings</a>
                    </li>
                </ul>
                <span class="navbar-text ms-auto text-light opacity-75 small">
                    {{ app_version }}
                </span>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Global Settings Modal -->
    <div class="modal fade" id="globalSettingsModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold"><i class="bi bi-gear me-2"></i> Global Settings</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body pt-3">
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-uppercase text-muted mb-2">Force Locale (Date/Time
                            Format)</label>
                        <select class="form-select border-2" id="globalLocaleSelect">
                            <option value="browser">Browser Default</option>
                            <option value="de">German (24h, DD.MM.YYYY)</option>
                            <option value="en-GB">English - UK (24h, DD/MM/YYYY)</option>
                            <option value="en-US">English - US (12h, MM/DD/YYYY)</option>
                        </select>
                        <div class="form-text mt-2">Forces calendars to display specific regional paradigms site-wide.
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" class="btn btn-primary fw-bold px-4 shadow-sm"
                        onclick="saveGlobalSettings()">Save & Reload</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const localeSelect = document.getElementById("globalLocaleSelect");
            localeSelect.value = localStorage.getItem("ical_locale") || "browser";
        });

        function saveGlobalSettings() {
            const localeSelect = document.getElementById("globalLocaleSelect");
            localStorage.setItem("ical_locale", localeSelect.value);
            location.reload();
        }

        window.getAppLocale = function () {
            const val = localStorage.getItem("ical_locale");
            return val === "browser" || !val ? undefined : val;
        };

        window.formatSmartDateRange = function (startStr, endStr) {
            if (!startStr) return "Unknown time";
            const start = new Date(startStr);
            const end = endStr ? new Date(endStr) : start;

            const pad = (n) => n.toString().padStart(2, '0');
            const formatTime = (d) => `${d.getHours()}:${pad(d.getMinutes())}`;

            const sY = start.getFullYear();
            const sM = pad(start.getMonth() + 1);
            const sD = pad(start.getDate());

            const eY = end.getFullYear();
            const eM = pad(end.getMonth() + 1);
            const eD = pad(end.getDate());

            let outStart = `${sD}.${sM}.`;
            if (sY !== eY) outStart += `${sY} `; else outStart += ` `;
            outStart += formatTime(start);

            if (start.getTime() === end.getTime()) return outStart;

            let outEnd = "";
            if (sY !== eY) {
                outEnd = `${eD}.${eM}.${eY} ${formatTime(end)}`;
            } else if (sM !== eM) {
                outEnd = `${eD}.${eM}. ${formatTime(end)}`;
            } else if (sD !== eD) {
                outEnd = `${eD}. ${formatTime(end)}`;
            } else {
                outEnd = formatTime(end); // same day
            }

            return `${outStart} - ${outEnd}`;
        };
    </script>

    {% block scripts %}{% endblock %}
</body>

</html>
